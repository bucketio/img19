<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" role="img" aria-labelledby="title desc">
  <title id="title">Ansible Playbook 工作方式</title>
  <desc id="desc">Playbook 定义任务，Ansible 按清单批量执行到多台主机。</desc>
  <rect width="900" height="430" fill="#ffffff"/>
  <text x="48" y="66" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#182033">把手工步骤写成 Playbook</text>
  <rect x="70" y="135" width="230" height="190" rx="22" fill="#fff5df" stroke="#e7c878" stroke-width="3"/>
  <text x="110" y="180" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#946200">Playbook</text>
  <text x="105" y="225" font-family="Arial, sans-serif" font-size="20" fill="#334155">安装软件</text>
  <text x="105" y="260" font-family="Arial, sans-serif" font-size="20" fill="#334155">复制文件</text>
  <text x="105" y="295" font-family="Arial, sans-serif" font-size="20" fill="#334155">启动服务</text>
  <path d="M322 230 H430" stroke="#607089" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="460" y="135" width="160" height="70" rx="18" fill="#edf5ff"/>
  <text x="505" y="178" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#2f6bd9">主机1</text>
  <rect x="660" y="135" width="160" height="70" rx="18" fill="#edf5ff"/>
  <text x="705" y="178" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#2f6bd9">主机2</text>
  <rect x="460" y="255" width="160" height="70" rx="18" fill="#e8f7ef"/>
  <text x="505" y="298" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#24704d">主机3</text>
  <rect x="660" y="255" width="160" height="70" rx="18" fill="#e8f7ef"/>
  <text x="705" y="298" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#24704d">主机4</text>
  <text x="160" y="382" font-family="Arial, sans-serif" font-size="20" fill="#5f6b80">自动化的关键：把经验写下来，让操作可以重复执行</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="#607089"/>
    </marker>
  </defs>
</svg>
