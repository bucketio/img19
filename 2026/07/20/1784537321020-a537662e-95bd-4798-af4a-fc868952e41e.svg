<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 400" width="940" height="400">
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0F2B4A"/><stop offset="1" stop-color="#0A1E35"/></linearGradient>
    <linearGradient id="gold04" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#C9A84C"/><stop offset="1" stop-color="#E8CC6E"/></linearGradient>
  </defs>
  <rect width="940" height="400" fill="url(#bg04)"/>
  <rect x="0" y="0" width="940" height="3" fill="url(#gold04)"/>
  
  <!-- Speed lines -->
  <g opacity="0.08">
    <line x1="350" y1="100" x2="850" y2="100" stroke="#C9A84C" stroke-width="1.5"/>
    <line x1="330" y1="140" x2="870" y2="140" stroke="#C9A84C" stroke-width="1"/>
    <line x1="320" y1="260" x2="880" y2="260" stroke="#C9A84C" stroke-width="1"/>
    <line x1="340" y1="300" x2="860" y2="300" stroke="#C9A84C" stroke-width="1.5"/>
  </g>
  
  <rect x="30" y="25" width="100" height="26" rx="13" fill="#C9A84C"/>
  <text x="80" y="42" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" font-weight="bold" fill="#0F2B4A">深度连载</text>
  
  <text x="50" y="155" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="46" font-weight="bold" fill="#ffffff">从3天到1小时</text>
  
  <!-- 3天 crossed out -->
  <text x="50" y="240" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="34" fill="#64748b">3天</text>
  <line x1="47" y1="218" x2="148" y2="244" stroke="#e53935" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Arrow -->
  <line x1="165" y1="237" x2="255" y2="237" stroke="#C9A84C" stroke-width="3"/>
  <polygon points="255,229 275,237 255,245" fill="#C9A84C"/>
  
  <text x="290" y="240" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="bold" fill="#ffffff">1小时</text>
  
  <rect x="400" y="216" width="88" height="34" rx="17" fill="#C9A84C"/>
  <text x="444" y="239" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" font-weight="bold" fill="#0F2B4A">提效90%</text>
  
  <text x="50" y="310" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" fill="#94a3b8">獴探·智写重新定义可研报告撰写</text>
  
  <text x="910" y="370" text-anchor="end" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="13" fill="#C9A84C" opacity="0.7">清源智界 · 獴探</text>
</svg>
